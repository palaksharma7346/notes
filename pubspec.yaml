name: note_genius
description: AI-powered study assistant
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  file_picker: ^8.0.3
  image_picker: ^1.1.1
  syncfusion_flutter_pdf: ^25.1.41
  http: ^1.2.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  flutter_dotenv: ^5.1.0
  share_plus: ^9.0.0
  path_provider: ^2.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/images/
